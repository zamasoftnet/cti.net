name: Publish to NuGet

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.x'

      - name: Decode SNK
        env:
          SNK_KEY: ${{ secrets.SNK_KEY }}
        run: |
          if [ -n "$SNK_KEY" ]; then
            echo "$SNK_KEY" | base64 -d > CTI/CTI/CTI.snk
          fi

      - name: Build package project
        run: dotnet build CTI/CTI/CTI.csproj -c Release

      - name: Test
        run: dotnet test CTI/CTITests/CTITests.csproj -c Release --no-build || true

      - name: Generate API docs
        run: |
          dotnet tool install -g docfx || true
          docfx docfx.json || true
          printf '<!DOCTYPE html><html><head><meta charset="UTF-8"><meta http-equiv="refresh" content="0; url=README.html"><title>CTI Driver for .NET - API Documentation</title></head><body><a href="README.html">API Documentation</a></body></html>' > build/apidoc/index.html

      - name: Pack
        run: dotnet pack CTI/CTI/CTI.csproj -c Release --no-build -o nupkgs

      - name: NuGet login (OIDC -> temp API key)
        id: login
        uses: NuGet/login@v1
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push to NuGet.org
        run: dotnet nuget push nupkgs/*.nupkg --api-key ${{ steps.login.outputs.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json

      - name: Create binary zip
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          DIRNAME="cti-dotnet-${VERSION}"
          mkdir -p "${DIRNAME}"
          cp CTI/CTI/bin/Release/netstandard2.0/CTI.dll "${DIRNAME}/"
          cp CTI/CTI/bin/Release/netstandard2.0/CTI.xml "${DIRNAME}/" 2>/dev/null || true
          cp README.md "${DIRNAME}/"
          cp -r build/apidoc "${DIRNAME}/apidoc" 2>/dev/null || true
          zip -r "${DIRNAME}.zip" "${DIRNAME}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: "cti-dotnet-*.zip"

      - name: Deploy API docs to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: build/apidoc
